<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Math Universe visualizes algebra, geometry, calculus, statistics, AI applications, and more." />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/svg+xml" href="/pwa-icon.svg" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <title>Math Universe Visualizations</title>
    <script>
      try {
        var theme = JSON.parse(localStorage.getItem("math-universe-theme") || '"dark"');
        if (theme === "dark") document.documentElement.classList.add("dark");
      } catch {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
