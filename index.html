<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Math Universe is an interactive mathematics visualization app for functions, limits, derivatives, integration, matrices, eigenvectors, slope fields, Fourier series, geometry, shapes, and syllabus learning." />
    <meta name="keywords" content="interactive math visualizations, functions graph visualizer, limits continuity, derivatives tangent lines, integration area, matrix transformations, eigenvectors, slope fields, Fourier series, math syllabus" />
    <meta name="author" content="Math Universe" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Math Universe Visualizations" />
    <meta property="og:description" content="Explore mathematics visually with interactive graphs, animations, formulas, syllabus navigation, and browser-only learning tools." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#07111f" />
    <link rel="icon" type="image/svg+xml" href="/math-universe-icon.svg" />
    <title>Math Universe Visualizations</title>
    <script>
      try {
        var theme = JSON.parse(localStorage.getItem("math-universe-theme") || '"dark"');
        if (theme === "dark") document.documentElement.classList.add("dark");
      } catch {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
